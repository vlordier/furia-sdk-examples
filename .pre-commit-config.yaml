repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-case-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.7
    hooks:
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/dprint/dprint
    rev: 0.49.1
    hooks:
      - id: dprint
        args: [fmt, --check]
        additional_dependencies:
          - dprint-plugin-rustfmt

  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace
        language: system
        args: ["--", "-D", "warnings"]
        pass_filenames: false
        always_run: true
        stages: [manual]

      - id: mkdocs-build
        name: mkdocs build
        entry: uv run mkdocs build --strict
        language: system
        pass_filenames: false
        always_run: true
        types: [markdown]
